name: Build NexusRemote (Sciter - sem Flutter)

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup vcpkg
        shell: bash
        run: |
          if [ ! -d "/c/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg.git /c/vcpkg
          fi
          cd /c/vcpkg
          git checkout 120deac3062162151622ca4860575a33844ba10b
          ./bootstrap-vcpkg.bat
          ./vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static

      - name: Apply branding
        shell: bash
        run: |
          sed -i "s/name = \"rustdesk\"/name = \"nexusremote\"/g" Cargo.toml
          sed -i "s/ProductName = \"RustDesk\"/ProductName = \"NexusRemote\"/g" Cargo.toml
          sed -i "s/FileDescription = \"RustDesk Remote Desktop\"/FileDescription = \"NexusRemote Remote Desktop\"/g" Cargo.toml
          sed -i "s/OriginalFilename = \"rustdesk.exe\"/OriginalFilename = \"nexusremote.exe\"/g" Cargo.toml
          sed -i "s/default-run = \"rustdesk\"/default-run = \"nexusremote\"/g" Cargo.toml
          if [ -f libs/hbb_common/src/config.rs ]; then
            sed -i "s/\"RustDesk\"/\"NexusRemote\"/g" libs/hbb_common/src/config.rs
          fi
          echo "Branding applied"

      - name: Build Sciter version
        shell: bash
        run: |
          export VCPKG_ROOT=/c/vcpkg
          export LIBCLANG_PATH="/c/Program Files/LLVM/bin"
          cargo build --release --features inline,vram
          echo "Build completed"
          ls -la target/release/nexusremote.exe 2>/dev/null || ls -la target/release/nexusremote* 2>/dev/null || ls -la target/release/*.exe 2>/dev/null

      - name: Package
        shell: bash
        run: |
          mkdir -p output
          cp target/release/nexusremote.exe output/ 2>/dev/null || cp target/release/nexusremote*.exe output/
          ls -la output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NexusRemote-Windows
          path: output/
          retention-days: 30
